<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geleceğimiz İçin Net Takibi ❤️</title>
    <style>
        /* El yazısı fontunu Windows cihazlarda Segoe Print ile sağlıyoruz */
        body {
            background-color: #ffeef2;
            font-family: 'Segoe Print', 'Comic Sans MS', cursive;
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #ff1493; font-size: 24px; margin-bottom: 10px; }
        .section-title { 
            background: #ffecf2; 
            padding: 5px; 
            border-radius: 10px; 
            margin: 15px 0;
            color: #d63384;
            font-weight: bold;
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        input {
            width: 60px;
            padding: 8px;
            border: 2px solid #ffc0cb;
            border-radius: 12px;
            text-align: center;
            font-family: sans-serif; /* Rakamlar daha net görünsün diye */
        }
        button {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            font-family: 'Segoe Print', cursive;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4); }
        #resultArea {
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            background: #fff5f8;
            border: 2px dashed #ff69b4;
            display: none; /* İlk başta gizli */
        }
        .footer { margin-top: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Başarı Yolculuğun 🎓</h1>
        <p>Her net, seni hedefine bir adım daha yaklaştırıyor...</p>

        <div class="section-title">TYT Netlerin</div>
        <div class="input-row"><span>Türkçe:</span> <input type="number" id="t_turkce" value="0"></div>
        <div class="input-row"><span>Matematik:</span> <input type="number" id="t_mat" value="0"></div>
        <div class="input-row"><span>Sosyal:</span> <input type="number" id="t_sosyal" value="0"></div>
        <div class="input-row"><span>Fen:</span> <input type="number" id="t_fen" value="0"></div>

        <div class="section-title">AYT Netlerin</div>
        <div class="input-row"><span>Matematik:</span> <input type="number" id="a_mat" value="0"></div>
        <div class="input-row"><span>Fizik:</span> <input type="number" id="a_fizik" value="0"></div>
        <div class="input-row"><span>Kimya:</span> <input type="number" id="a_kimya" value="0"></div>
        <div class="input-row"><span>Biyoloji:</span> <input type="number" id="a_biyo" value="0"></div>

        <button onclick="hesaplaSiralama()">Hesapla Sevgilim ✨</button>

        <div id="resultArea">
            <h3 id="puanYazi" style="color:#d63384; margin:0;"></h3>
            <p id="siralamaYazi" style="font-weight:bold; font-size:20px; margin:10px 0;"></p>
            <p id="motivasyonYazi" style="font-style:italic; color:#666;"></p>
        </div>

        <div class="footer">Kirpi tarafından sevgiyle kodlandı ❤️</div>
    </div>

    <script>
        function hesaplaSiralama() {
            // Verileri toplama
            const tytNet = (parseFloat(document.getElementById('t_turkce').value) || 0) +
                           (parseFloat(document.getElementById('t_mat').value) || 0) +
                           (parseFloat(document.getElementById('t_sosyal').value) || 0) +
                           (parseFloat(document.getElementById('t_fen').value) || 0);

            const aytNet = (parseFloat(document.getElementById('a_mat').value) || 0) +
                           (parseFloat(document.getElementById('a_fizik').value) || 0) +
                           (parseFloat(document.getElementById('a_kimya').value) || 0) +
                           (parseFloat(document.getElementById('a_biyo').value) || 0);

            // Yaklaşık Yerleştirme Puanı (OBP dahil edilmemiş kaba taslak)
            // TYT %40, AYT %60 etkiler
            let toplamPuan = 150 + (tytNet * 1.5) + (aytNet * 3.5); 
            
            let tahmin = "";
            let mesaj = "";

            // Güncel veriye dayalı basit tahmin motoru
            if (toplamPuan >= 460) {
                tahmin = "İlk 5.000 - 15.000";
                mesaj = "Sen bir dâhilsin! Bu netlerle istediğin her yer olur askim. ❤️";
            } else if (toplamPuan >= 400) {
                tahmin = "20.000 - 45.000";
                mesaj = "Harika gidiyorsun, hedefini yoksa diş olarak mı değiştirdin :)))! ✨";
            } else if (toplamPuan >= 340) {
                tahmin = "60.000 - 100.000";
                mesaj = "Çok sağlam bir temelin var, az daha gayretle uçacağız. Seni çooook seviyorum! 💪";
            } else {
                tahmin = "Gelişmekte olan bir başarı...";
                mesaj = "Asla pes etme, ben her zaman yanındayım ve sana inanıyorum güzelim. ✨";
            }

            // Sonuçları göster
            document.getElementById('resultArea').style.display = "block";
            document.getElementById('puanYazi').innerText = "Tahmini Puanın: " + toplamPuan.toFixed(2);
            document.getElementById('siralamaYazi').innerText = "Tahmini Sıralama: " + tahmin;
            document.getElementById('motivasyonYazi').innerText = mesaj;
        }
    </script>
</body>
</html>
